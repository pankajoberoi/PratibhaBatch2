<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .card {
        height: 300px;
        width: 200px;
        border: 2px solid black;
        margin: auto;
        margin-top: 5px;
      }
      .heading {
        margin-bottom: 10px;
        text-align: center;
        text-decoration: underline;
      }
      #viratimg {
        border-radius: 50px;
        height: 80px;
        width: 80px;
        overflow: hidden;
        margin: auto;
        box-shadow: 0px 0px 5px blue;
      }
      #image {
        height: 80px;
        width: 80px;
      }
      #stats {
        margin-top: 20px;
        width: 150px;
        margin-left: 20px;
        box-shadow: 0px 0px 5px black;
      }
      ul {
        list-style-type: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="heading">
        <h1>Virat Kohli</h1>
      </div>

      <div id="viratimg">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Virat_Kohli_in_PMO_New_Delhi.jpg/500px-Virat_Kohli_in_PMO_New_Delhi.jpg"
          alt=""
          id="image"
        />
      </div>

      <marquee direction="right">Text Captain</marquee>

      <div id="stats">
        <ul>
          <li>Centuries : 75</li>
          <li>Total score : 10,234</li>
          <li>Age : 38</li>
        </ul>
      </div>
    </div>
  </body>
</html>
