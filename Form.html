<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="Database.html">
      <div>
        <label for="UserCollege">College : </label>
        <input
          type="text"
          placeholder="Enter Your Full Name"
          required
          id="UserCollege"
          value="Pratibha College"
          name="CollegeAddress"
          readonly
        />
      </div>
      <br />

      <div>
        <label for="UserName">Name : </label>
        <input
          type="text"
          placeholder="Enter Your Full Name"
          required
          id="UserName"
          maxlength="6"
        />
      </div>
      <br />

      <div>
        <label for="userEmail">Email : </label>
        <input
          type="email"
          placeholder="abc@gmail.com"
          required
          id="userEmail"
        />
      </div>

      <br />

      <div>
        <label for="userPassword">Password : </label>
        <input
          type="password"
          placeholder="Your Password"
          required
          id="userPassword"
          minlength="6"
        />
      </div>
      <br />
      <div>
        <label for="UserDate">Date : </label>
        <input type="date" id="UserDate" />
      </div>
      <br />

      <div>
        <label for="UserAge">Age : </label>
        <input type="number" id="UserAge" />
      </div>
      <br />

      <div>
        <label for="UserGender">Gender : </label>
        <input type="radio" value="Male" name="gender" /> Male
        <input type="radio" value="Female" name="gender" /> Female
      </div>
      <br />

      <div>
        <label for="UserPermision">Terms & Conditions : </label>
        <input type="checkbox" id="UserPermision" checked />
      </div>
      <br />

      <div>
        <textarea
          placeholder="Your Feedback"
          rows="7"
          cols="30"
          maxlength="4"
        ></textarea>
      </div>
      <br />

      <div>
        <label for="Placement">Job : </label>
        <select id="Placement" name="CurrentCompany">
          <option value="" selected>Select an option</option>
          <option value="TCS">TCS</option>
          <option value="WIPRO">WIPRO</option>
          <option value="INFY">INFY</option>
          <option value="GOOGLE">GOOGLE</option>
        </select>
      </div>
      <br />

      <div>
        <label for="UserPhoto">Your passport size photo : </label>
        <input type="file" id="UserPhoto" accept=".png,.jpg" />
      </div>
      <br />

      <div>
        <label for="UserPortfolioLink">Portfolio link : </label>
        <input type="url" id="UserPortfolioLink" />
      </div>
      <br />

      <div>
        <label for="UserTestFeedback">Difficulty : </label>
        <input type="range" id="UserTestFeedback" />
      </div>
      <br />

      <div>
        <input type="hidden" value="Pankaj" />
      </div>
      <br />

      <br />
      <br />

      <button type="submit">Save</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
